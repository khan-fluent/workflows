name: Reusable — Terraform

# Reusable workflow for terraform plan (PR) and apply (push to main).
# Inherits any TF_VAR_* secrets from the calling repo via `secrets: inherit`.

on:
  workflow_call:
    inputs:
      working_directory:
        description: Working directory containing the Terraform root module
        type: string
        default: terraform/roots/dev
      tf_version:
        description: Terraform version
        type: string
        default: '1.10.0'
      aws_region:
        description: AWS region
        type: string
        default: us-east-1
      apply:
        description: If true, run apply; otherwise plan only
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: false
      JWT_SECRET:
        required: false
      SLACK_CLIENT_ID:
        required: false
      SLACK_CLIENT_SECRET:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan
    if: ${{ !inputs.apply }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_slack_client_id: ${{ secrets.SLACK_CLIENT_ID }}
      TF_VAR_slack_client_secret: ${{ secrets.SLACK_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${process.env.PLAN || 'No plan output'}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    if: ${{ inputs.apply }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_slack_client_id: ${{ secrets.SLACK_CLIENT_ID }}
      TF_VAR_slack_client_secret: ${{ secrets.SLACK_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
